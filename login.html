<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameZone | Login</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* CSS variables (root element) */
        :root {
            --primary: #22c55e;
            --dark-bg: #0f172a;
            --header-bg: #020617;
            --card-bg: #020617;
            --text: white;
            --text-secondary: #cbd5e1;
            --border: #1e293b;
            --input-bg: #1e293b;
            --success: #22c55e;
            --error: #ef4444;
        }
        
        /* Light theme variables */
        .light-theme {
            --primary: #16a34a;
            --dark-bg: #f8fafc;
            --header-bg: #ffffff;
            --card-bg: #ffffff;
            --text: #0f172a;
            --text-secondary: #475569;
            --border: #e2e8f0;
            --input-bg: #ffffff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 60px;
            background: var(--header-bg);
            border-bottom: 2px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            color: var(--primary);
            text-decoration: none;
        }

        .nav a {
            position: relative;
            margin: 0 15px;
            text-decoration: none;
            color: var(--text);
            padding-bottom: 5px;
        }

        .nav a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0%;
            height: 2px;
            background: var(--primary);
            transition: 0.3s;
        }

        .nav a:hover::after {
            width: 100%;
        }

        .nav a:hover {
            color: var(--primary);
        }

        .nav a.active {
            color: var(--primary);
        }

        .nav a.active::after {
            width: 100%;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .theme-toggle {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 20px;
            cursor: pointer;
        }

        .cart {
            font-size: 18px;
            cursor: pointer;
            position: relative;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--primary);
            color: black;
            font-size: 12px;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* LOGIN MAIN CONTAINER */
        .login-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }

        /* Gaming Animation Background */
        .gaming-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .bg-object {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            filter: blur(40px);
        }

        .obj-1 {
            width: 300px;
            height: 300px;
            background: var(--primary);
            top: -100px;
            left: -100px;
            animation: float 15s infinite ease-in-out;
        }

        .obj-2 {
            width: 400px;
            height: 400px;
            background: #3b82f6;
            bottom: -150px;
            right: -150px;
            animation: float 20s infinite ease-in-out reverse;
        }

        .obj-3 {
            width: 250px;
            height: 250px;
            background: #8b5cf6;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 10s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(50px, 50px) rotate(120deg); }
            66% { transform: translate(-50px, 20px) rotate(240deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.1; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.2; }
        }

        /* LOGIN CARD */
        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* TABS */
        .login-tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 15px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-weight: 500;
            color: var(--text-secondary);
            position: relative;
        }

        .tab.active {
            color: var(--primary);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { width: 0; }
            to { width: 100%; }
        }

        /* FORMS */
        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 16px;
        }

        .form-input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 15px;
            transition: 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
        }

        .form-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 16px;
        }

        .password-toggle:hover {
            color: var(--primary);
        }

        /* FORM OPTIONS */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remember-me input {
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .remember-me label {
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
        }

        .forgot-link {
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        /* TERMS CHECKBOX */
        .terms-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .terms-checkbox input {
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .terms-checkbox label {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .terms-checkbox a {
            color: var(--primary);
            text-decoration: none;
        }

        .terms-checkbox a:hover {
            text-decoration: underline;
        }

        /* SUBMIT BUTTON */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            border: none;
            border-radius: 10px;
            color: black;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
            margin-bottom: 25px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(34, 197, 94, 0.3);
        }

        .submit-btn i {
            transition: 0.3s;
        }

        .submit-btn:hover i {
            transform: translateX(5px);
        }

        /* SOCIAL LOGIN */
        .social-login {
            text-align: center;
        }

        .social-login p {
            color: var(--text-secondary);
            margin-bottom: 15px;
            position: relative;
        }

        .social-login p::before,
        .social-login p::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background: var(--border);
        }

        .social-login p::before {
            left: 0;
        }

        .social-login p::after {
            right: 0;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-icon {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            background: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            text-decoration: none;
            transition: 0.3s;
            font-size: 20px;
        }

        .social-icon:hover {
            transform: translateY(-3px);
        }

        .social-icon.google:hover { background: #DB4437; color: white; }
        .social-icon.facebook:hover { background: #1877F2; color: white; }
        .social-icon.discord:hover { background: #5865F2; color: white; }
        .social-icon.microsoft:hover { background: #00A4EF; color: white; }

        /* ERROR MESSAGE */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        /* SUCCESS MESSAGE */
        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            animation: slideDown 0.5s ease;
        }

        /* PASSWORD STRENGTH */
        .password-strength {
            margin-top: 8px;
        }

        .strength-bar {
            display: flex;
            gap: 5px;
            margin-bottom: 5px;
        }

        .strength-segment {
            height: 4px;
            flex: 1;
            background: var(--border);
            border-radius: 2px;
            transition: 0.3s;
        }

        .strength-segment.active {
            background: var(--primary);
        }

        .strength-text {
            color: var(--text-secondary);
            font-size: 12px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .header {
                padding: 15px 20px;
            }
            
            .nav {
                display: none;
            }
            
            .login-card {
                padding: 30px 20px;
            }
            
            .social-icons {
                flex-wrap: wrap;
            }
            
            .obj-1, .obj-2, .obj-3 {
                opacity: 0.05;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <a href="index.html" class="logo">GameZone</a>

        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="accessories.html">Accessories</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="#" class="active">Login</a>
        </nav>

        <div class="header-controls">
            <button class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i>
            </button>
            <div class="cart">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count">0</span>
            </div>
        </div>
    </header>

    <!-- LOGIN MAIN CONTAINER -->
    <div class="login-container">
        <!-- Gaming Animation Background -->
        <div class="gaming-bg">
            <div class="bg-object obj-1"></div>
            <div class="bg-object obj-2"></div>
            <div class="bg-object obj-3"></div>
        </div>

        <!-- LOGIN CARD -->
        <div class="login-card">
            <!-- Tabs -->
            <div class="login-tabs">
                <div class="tab active" onclick="switchTab('login')">Login</div>
                <div class="tab" onclick="switchTab('signup')">Sign Up</div>
            </div>

            <!-- Error Message (hidden by default) -->
            <div id="errorMessage" class="error-message" style="display: none;">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>

            <!-- Success Message (hidden by default) -->
            <div id="successMessage" class="success-message" style="display: none;">
                <i class="fas fa-check-circle"></i>
                <span id="successText"></span>
            </div>

            <!-- LOGIN FORM -->
            <div id="loginForm" class="auth-form active">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="input-label">Email or Username</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" class="form-input" id="loginEmail" placeholder="Enter email or username" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="input-label">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" class="form-input" id="loginPassword" placeholder="Enter password" required>
                            <i class="fas fa-eye password-toggle" onclick="togglePassword('loginPassword', this)"></i>
                        </div>
                    </div>

                    <div class="form-options">
                        <div class="remember-me">
                            <input type="checkbox" id="remember">
                            <label for="remember">Remember me</label>
                        </div>
                        <a href="#" class="forgot-link" onclick="showForgotPassword(event)">Forgot Password?</a>
                    </div>

                    <button type="submit" class="submit-btn">
                        Login
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </form>

                <div class="social-login">
                    <p>Or login with</p>
                    <div class="social-icons">
                        <a href="#" class="social-icon google" onclick="socialLogin('google')">
                            <i class="fab fa-google"></i>
                        </a>
                        <a href="#" class="social-icon facebook" onclick="socialLogin('facebook')">
                            <i class="fab fa-facebook-f"></i>
                        </a>
                        <a href="#" class="social-icon discord" onclick="socialLogin('discord')">
                            <i class="fab fa-discord"></i>
                        </a>
                        <a href="#" class="social-icon microsoft" onclick="socialLogin('microsoft')">
                            <i class="fab fa-microsoft"></i>
                        </a>
                    </div>
                </div>
            </div>

            <!-- SIGNUP FORM -->
            <div id="signupForm" class="auth-form">
                <form onsubmit="handleSignup(event)">
                    <div class="form-row" style="display: flex; gap: 15px;">
                        <div class="form-group" style="flex: 1;">
                            <label class="input-label">First Name</label>
                            <div class="input-wrapper">
                                <i class="fas fa-user input-icon"></i>
                                <input type="text" class="form-input" id="firstName" placeholder="First name" required>
                            </div>
                        </div>

                        <div class="form-group" style="flex: 1;">
                            <label class="input-label">Last Name</label>
                            <div class="input-wrapper">
                                <i class="fas fa-user input-icon"></i>
                                <input type="text" class="form-input" id="lastName" placeholder="Last name" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="input-label">Email</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" class="form-input" id="signupEmail" placeholder="Enter email" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="input-label">Username</label>
                        <div class="input-wrapper">
                            <i class="fas fa-at input-icon"></i>
                            <input type="text" class="form-input" id="username" placeholder="Choose username" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="input-label">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" class="form-input" id="signupPassword" placeholder="Create password" required onkeyup="checkPasswordStrength()">
                            <i class="fas fa-eye password-toggle" onclick="togglePassword('signupPassword', this)"></i>
                        </div>
                        <!-- Password Strength Indicator -->
                        <div class="password-strength" id="passwordStrength">
                            <div class="strength-bar">
                                <div class="strength-segment" id="strength1"></div>
                                <div class="strength-segment" id="strength2"></div>
                                <div class="strength-segment" id="strength3"></div>
                                <div class="strength-segment" id="strength4"></div>
                            </div>
                            <span class="strength-text" id="strengthText">Enter password</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="input-label">Confirm Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" class="form-input" id="confirmPassword" placeholder="Confirm password" required>
                            <i class="fas fa-eye password-toggle" onclick="togglePassword('confirmPassword', this)"></i>
                        </div>
                    </div>

                    <div class="terms-checkbox">
                        <input type="checkbox" id="terms" checked>
                        <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
                    </div>

                    <button type="submit" class="submit-btn">
                        Create Account
                        <i class="fas fa-user-plus"></i>
                    </button>
                </form>

                <div class="social-login">
                    <p>Or sign up with</p>
                    <div class="social-icons">
                        <a href="#" class="social-icon google" onclick="socialLogin('google')">
                            <i class="fab fa-google"></i>
                        </a>
                        <a href="#" class="social-icon facebook" onclick="socialLogin('facebook')">
                            <i class="fab fa-facebook-f"></i>
                        </a>
                        <a href="#" class="social-icon discord" onclick="socialLogin('discord')">
                            <i class="fab fa-discord"></i>
                        </a>
                        <a href="#" class="social-icon microsoft" onclick="socialLogin('microsoft')">
                            <i class="fab fa-microsoft"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- SCROLL TO TOP BUTTON -->
    <button class="scroll-to-top" id="scrollToTop" style="position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; background: var(--primary); color: black; border: none; border-radius: 50%; cursor: pointer; display: none; align-items: center; justify-content: center; font-size: 20px; z-index: 99; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
        <i class="fas fa-chevron-up"></i>
    </button>

    <script>
        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i');
        
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-theme');
            themeIcon.className = document.body.classList.contains('light-theme') ? 'fas fa-sun' : 'fas fa-moon';
        });

        // Scroll to top
        const scrollToTopBtn = document.getElementById('scrollToTop');
        
        window.addEventListener('scroll', () => {
            scrollToTopBtn.style.display = window.pageYOffset > 300 ? 'flex' : 'none';
        });
        
        scrollToTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Cart functionality
        let cartCount = 0;
        const cartCountSpan = document.querySelector('.cart-count');
        
        function addToCart() {
            cartCount++;
            cartCountSpan.textContent = cartCount;
        }

        // Switch between Login and Signup tabs
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab');
            const forms = document.querySelectorAll('.auth-form');
            
            tabs.forEach(t => t.classList.remove('active'));
            forms.forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                tabs[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                tabs[1].classList.add('active');
                document.getElementById('signupForm').classList.add('active');
            }
            
            // Hide any messages when switching tabs
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        // Toggle password visibility
        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash password-toggle';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye password-toggle';
            }
        }

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorDiv.style.display = 'flex';
            
            // Hide success message if visible
            document.getElementById('successMessage').style.display = 'none';
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        // Show success message
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            const successText = document.getElementById('successText');
            successText.textContent = message;
            successDiv.style.display = 'flex';
            
            // Hide error message if visible
            document.getElementById('errorMessage').style.display = 'none';
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 5000);
        }

        // Handle Login
        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const remember = document.getElementById('remember').checked;
            
            // Simple validation
            if (!email || !password) {
                showError('Please fill in all fields');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }
            
            // Simulate login success
            showSuccess('Login successful! Redirecting...');
            
            // Reset form
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
            
            // Simulate redirect after 2 seconds
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2000);
        }

        // Handle Signup
        function handleSignup(event) {
            event.preventDefault();
            
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('signupEmail').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('terms').checked;
            
            // Validation
            if (!firstName || !lastName || !email || !username || !password || !confirmPassword) {
                showError('Please fill in all fields');
                return;
            }
            
            if (!terms) {
                showError('Please accept the Terms of Service');
                return;
            }
            
            if (password.length < 8) {
                showError('Password must be at least 8 characters');
                return;
            }
            
            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }
            
            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('Please enter a valid email address');
                return;
            }
            
            // Simulate signup success
            showSuccess('Account created successfully! Please login.');
            
            // Reset form
            document.getElementById('firstName').value = '';
            document.getElementById('lastName').value = '';
            document.getElementById('signupEmail').value = '';
            document.getElementById('username').value = '';
            document.getElementById('signupPassword').value = '';
            document.getElementById('confirmPassword').value = '';
            
            // Switch to login tab after 2 seconds
            setTimeout(() => {
                switchTab('login');
            }, 2000);
        }

        // Check password strength
        function checkPasswordStrength() {
            const password = document.getElementById('signupPassword').value;
            const strengthSegments = document.querySelectorAll('#strength1, #strength2, #strength3, #strength4');
            const strengthText = document.getElementById('strengthText');
            
            // Reset all segments
            strengthSegments.forEach(seg => seg.classList.remove('active'));
            
            if (!password) {
                strengthText.textContent = 'Enter password';
                return;
            }
            
            let strength = 0;
            
            // Length check
            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;
            
            // Contains number
            if (/\d/.test(password)) strength++;
            
            // Contains special character
            if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) strength++;
            
            // Contains uppercase
            if (/[A-Z]/.test(password)) strength++;
            
            // Contains lowercase
            if (/[a-z]/.test(password)) strength++;
            
            // Calculate strength level (0-4)
            let level = 0;
            if (strength >= 5) level = 4;
            else if (strength >= 4) level = 3;
            else if (strength >= 3) level = 2;
            else if (strength >= 2) level = 1;
            
            // Update UI
            for (let i = 0; i < level; i++) {
                strengthSegments[i].classList.add('active');
            }
            
            // Update text
            const texts = ['Very Weak', 'Weak', 'Fair', 'Good', 'Strong'];
            strengthText.textContent = texts[level];
            strengthText.style.color = level >= 3 ? 'var(--primary)' : 'var(--text-secondary)';
        }

        // Forgot password
        function showForgotPassword(event) {
            event.preventDefault();
            showSuccess('Password reset link sent to your email!');
        }

        // Social login
        function socialLogin(provider) {
            showSuccess(`Connecting with ${provider}...`);
            
            // Simulate social login
            setTimeout(() => {
                showSuccess(`${provider} login successful!`);
            }, 1500);
        }

        // Initialize theme
        document.addEventListener('DOMContentLoaded', () => {
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
                document.body.classList.add('light-theme');
                themeIcon.className = 'fas fa-sun';
            }
        });
    </script>
